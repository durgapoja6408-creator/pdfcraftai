# .github/workflows/all-tools.yml
#
# 2026-06-03 — COMPREHENSIVE per-tool execution + backend/security/SEO
# sweep. Manual only (the AI leg spends real credits). Runs every tool
# in the catalog (113) once on chromium + 26 infra checks, then prints a
# per-tool PASS/GAP matrix to the run summary.
#
#   which=free  → free tools + infra only (NO auth, NO credit spend)
#   which=all   → + AI tools (needs PROD_E2E_TEST_* + PROD_E2E_AI_BUDGET_OK;
#                 AI tests tolerate 402 out-of-credits)
#
# Requires prod in TEST MODE for the AI/auth leg (Turnstile test keys),
# same as the weekly prod-e2e 'full' phase.

name: all-tools

on:
  workflow_dispatch:
    inputs:
      which:
        description: "Scope"
        required: false
        default: "all"
        type: choice
        options:
          - free
          - all
      url:
        description: "URL to test against"
        required: false
        default: "https://pdfcraftai.com"

jobs:
  all-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Generate fixtures
        run: node tests/fixtures/generate-all.mjs
      - name: Run all-tools + backend/security/SEO
        env:
          PROD_E2E_URL: ${{ github.event.inputs.url || 'https://pdfcraftai.com' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
          PROD_E2E_TEST_EMAIL: ${{ github.event.inputs.which == 'all' && secrets.PROD_E2E_TEST_EMAIL || '' }}
          PROD_E2E_TEST_PASSWORD: ${{ github.event.inputs.which == 'all' && secrets.PROD_E2E_TEST_PASSWORD || '' }}
          PROD_E2E_AI_BUDGET_OK: ${{ github.event.inputs.which == 'all' && secrets.PROD_E2E_AI_BUDGET_OK || '' }}
        # Single project (chromium) so each tool runs exactly once.
        # `|| true` lets the matrix summary always render even when
        # some tools gap; the matrix is the real signal.
        run: |
          npx playwright test --config=playwright.prod.config.ts --project=chromium \
            all-tools-execution.spec.ts backend-security-seo.spec.ts \
            --reporter=github,json --workers=4 || true
      - name: Summarize per-tool matrix
        if: always()
        run: node scripts/summarize-tool-matrix.mjs results.json
      - name: Upload results.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-tools-results
          path: results.json
          retention-days: 14
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-tools-report
          path: playwright-report-prod/
          retention-days: 14
